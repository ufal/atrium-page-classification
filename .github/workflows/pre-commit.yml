name: pre-commit

on:
  pull_request:
    branches: [test, master]
  push:
    branches: [test, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
