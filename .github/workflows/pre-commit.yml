name: pre-commit

on:
  pull_request:
    branches: [test, master]
  push:
    branches: [test, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The official action automatically handles caching and runs --all-files
      - uses: pre-commit/action@v3.0.1