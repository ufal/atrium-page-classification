name: pre-commit

on:
  pull_request:
    branches: [test, master]
  push:
    branches: [test, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        # --show-diff-on-failure ensures that if ruff or shellcheck modifies a file
        # or flags an error, the exact diff is printed to the GitHub Actions console.
        run: pre-commit run --all-files --show-diff-on-failure
