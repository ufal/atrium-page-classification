name: Image Security Scan

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  schedule:
    - cron: "0 6 * * 1"   # weekly re-scan; new CVEs land continuously
  workflow_dispatch:

env:
  IMAGE_REF: ghcr.io/ufal/atrium-page-classification:latest

jobs:
  image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write   # upload SARIF to Security tab
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR (to pull image)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan → SARIF
        # SECURITY: trivy-action tags ≤ 0.34.2 were compromised (Mar 2026).
        # Use ≥ 0.35.0. Pin to a commit SHA in production.
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"   # report-only; flip to "1" to gate on CRITICAL/HIGH

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REF }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.spdx.json
          retention-days: 90
