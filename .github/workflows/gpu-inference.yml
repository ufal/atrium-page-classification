name: GPU Inference Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"   # weekly, Sunday 02:00 UTC

# ⚠️ INFRA-GATED — requires a self-hosted runner with NVIDIA GPU registered
#    with labels [self-hosted, gpu] and NVIDIA Container Toolkit installed.
#    Owner: @rharasim. Until the runner exists this workflow queues silently.

jobs:
  gpu-tests:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v5

      - name: Show GPU
        run: nvidia-smi

      - name: Install APT packages
        run: sudo apt-get update && sudo apt-get install -y build-essential g++ libgl1 libglib2.0-0 poppler-utils

      - name: Install dependencies (CUDA torch)
        run: |
          python -m pip install --upgrade pip
          # cu126 matches the Dockerfile's TORCH_INDEX_URL for GPU builds
          pip install torch==2.7.1 torchvision==0.22.1 \
              --index-url https://download.pytorch.org/whl/cu126
          for req in setup/requirements.txt setup/requirements-test.txt service/requirements.txt; do
            if [ -f "$req" ]; then pip install -r "$req"; fi
          done
          pip install pytest

      - name: Run GPU (slow) tests
        env:
          PYTHONPATH: .
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m pytest -m slow -v --tb=short
