name: Scheduled Smoke Tests

on:
  schedule:
    - cron: "0 3 * * *"   # daily 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APT_PACKAGES: "build-essential g++ libgl1 libglib2.0-0 poppler-utils"
  PRE_INSTALL_TORCH: "torch==2.7.1 torchvision==0.22.1"
  REQUIREMENTS: "setup/requirements.txt setup/requirements-test.txt service/requirements.txt"

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-smoke-${{ hashFiles('setup/requirements.txt') }}
          restore-keys: hf-models-smoke-

      - name: Install APT packages
        run: sudo apt-get update && sudo apt-get install -y ${{ env.APT_PACKAGES }}

      - name: Pre-install PyTorch (CPU wheel)
        run: pip install ${{ env.PRE_INSTALL_TORCH }} --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          for req in ${{ env.REQUIREMENTS }}; do
            if [ -f "$req" ]; then pip install -r "$req"; fi
          done
          pip install pytest pytest-cov

      - name: Verify HF model revision exists
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          HfApi().repo_info('ufal/vit-historical-page', revision='v4.3')
          print('HF revision v4.3 OK')
          "

      - name: Run slow tests (models + network)
        env:
          PYTHONPATH: .
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m pytest -m slow -v --tb=short

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = `Scheduled smoke tests failed (${new Date().toISOString().slice(0,10)})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The scheduled \`slow\` test run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely cause: upstream HF revision moved, LINDAT API change, or a dependency update.`,
              labels: ["ci", "upstream"],
            });
