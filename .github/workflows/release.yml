name: Automated Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

permissions:
  contents: write # Needed to create a GitHub Release

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7   # <-- Bumped from v4 to v5

      - name: Package Service Artifacts
        run: |
          echo "Packaging standalone API service artifact..."
          mkdir -p atrium-api-service

          # Copy necessary directories and files (aligned with new structure)
          cp -r service/ atrium-api-service/
          cp -r setup/ atrium-api-service/
          cp run.py classifier.py README.md atrium-api-service/

          # Create zip while ignoring git artifacts and python cache
          zip -r service_page_classifier.zip atrium-api-service/ -x "*/__pycache__/*" "*/.DS_Store" "*/.git/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            service_page_classifier.zip
