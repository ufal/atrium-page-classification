name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        # Fills the CI logs with standard linting errors (unused imports, etc.)
        run: ruff check .

  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          # Cache key depends on the requirements file, so it updates if you change models/deps
          key: ${{ runner.os }}-hf-cache-${{ hashFiles('setup/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r setup/requirements.txt
          pip install -r setup/requirements-test.txt

      - name: Run test suite
        # We assume tests might be marked to skip massive models on CI.
        # Remove '-m "not slow"' if you want everything to run.
        run: |
          pytest tests/ -v